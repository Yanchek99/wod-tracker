plugins:
  - rubocop-performance
  - rubocop-rails
  - rubocop-capybara

Rails:
  Enabled: true

AllCops:
  DisplayCopNames: true
  DisplayStyleGuide: true
  Exclude:
    - vendor/**/*
    - db/**/*
    - tmp/**/*
    - bin/**/*
    - node_modules/**/*
    - config/initializers/simple_form_bootstrap.rb
  NewCops: enable
  ExtraDetails: true
  TargetRubyVersion: 3.4
  TargetRailsVersion: 8.1

Layout/EmptyLinesAroundAttributeAccessor:
  Enabled: true

Layout/LineLength:
  Max: 160
  Exclude:
    - config/**/*

Metrics/AbcSize:
  Max: 20
  Exclude:
    - app/models/ability.rb

Metrics/BlockLength:
  CountComments: false
  Max: 25
  Exclude:
    - config/**/*
    # Rake namespaces grow linearly with the number of independent tasks inside
    # them, not with any one task's complexity -- same shape as config/**/* above.
    - lib/tasks/**/*.rake

Metrics/ClassLength:
  Exclude:
    - app/controllers/workouts_controller.rb
    - app/services/cf_wod/workout_parser.rb
    - test/services/cf_wod/workout_parser_corpus_test.rb
    - app/services/workout_extraction/llm_parser.rb
    - test/services/workout_extraction/llm_parser_test.rb
    - test/models/workout_test.rb
    - test/models/workout_fingerprint_test.rb
    - test/migrations/backfill_segments_for_top_level_exercises_test.rb
    - test/system/workout_drag_ordering_test.rb
    - test/system/workout_sortable_card_inputs_test.rb
    - test/controllers/workouts_controller_test.rb
    - test/helpers/workouts_helper_test.rb
    - test/jobs/scrape_cf_wod_job_test.rb

Metrics/MethodLength:
  CountComments: false
  Max: 20

Performance/AncestorsInclude:
  Enabled: false

Performance/BigDecimalWithNumericArgument:
  Enabled: false

Performance/RedundantSortBlock:
  Enabled: false

Performance/RedundantStringChars:
  Enabled: false

Performance/ReverseFirst:
  Enabled: false

Performance/SortReverse:
  Enabled: false

Performance/Squeeze:
  Enabled: false

Performance/StringInclude:
  Enabled: false

Rails/InverseOf:
  Enabled: false

Rails/LexicallyScopedActionFilter:
  Exclude:
    - app/controllers/concerns/*

Security/Open:
  Exclude:
    - app/models/user.rb

Style/ClassAndModuleChildren:
  Description: 'Checks style of children classes and modules.'
  Enabled: true
  EnforcedStyle: nested

Style/Documentation:
  Description: 'Document classes and non-namespace modules.'
  Enabled: false

Style/ExpandPathArguments:
  Exclude:
    - Rakefile
    - test/test_helper.rb

Style/FrozenStringLiteralComment:
  Enabled: false

Style/SymbolArray:
  Enabled: false
